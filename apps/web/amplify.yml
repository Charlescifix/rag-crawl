version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd ../..
        - npm ci
        - cd apps/web
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - ../../node_modules/**/*
      - node_modules/**/*
