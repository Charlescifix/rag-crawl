version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd ../..
        - npm ci --workspace=apps/web --include-workspace-root
    build:
      commands:
        - cd apps/web
        - npm run build
  artifacts:
    baseDirectory: apps/web/dist
    files:
      - '**/*'
  cache:
    paths:
      - ../../node_modules/**/*
